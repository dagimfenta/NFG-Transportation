<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFG Transportation</title>
    <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">
        <img src="logo.png" alt="NFG Transportation" />
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" aria-current="page">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <section class="hero" id="top" aria-label="Welcome">
      <div class="hero__bg" aria-hidden="true">
        <video
          class="hero__video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        >
          <source src="https://aqa4ucdpxinxbkgx.public.blob.vercel-storage.com/hero.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <h1 class="hero__title"> </h1>
        <p class="hero__subtitle">Your trusted transportation partner.</p>
      </div>
    </section>

    <main class="page" id="contact">
      <div class="page__header">
        <h1>Contact us</h1>
        <p>Send a message and we will get back to you.</p>
      </div>

      <form action="#" method="post" id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn">Send message</button>
      </form>
    </main>
  </body>
</html>
